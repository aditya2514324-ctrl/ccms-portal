<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Alok Mohta - Patient Appointment Portal</title>
    <style>
        :root {
            --primary-color: #e63946;
            --secondary-color: #1d3557;
            --bg-accent: #f1faee;
            --text-dark: #2b2d42;
            --text-light: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            min-height: 100vh;
            color: var(--text-dark);
            background-color: #f7f9fc;
            background-image: 
                radial-gradient(var(--primary-color) 1px, transparent 0),
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px, 20px 20px, 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary-color), #457b9d);
            color: var(--text-light);
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .doctor-name { font-size: 2.4rem; font-weight: 700; margin-bottom: 5px; }
        .doctor-meta { font-size: 1.1rem; opacity: 0.9; margin-bottom: 15px; }
        
        .info-badges { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-red { border-color: var(--primary-color); background: rgba(230, 57, 70, 0.2); }

        .medical-cross {
            display: inline-block; width: 14px; height: 14px; position: relative;
        }
        .medical-cross:before, .medical-cross:after {
            content: ""; position: absolute; background: var(--primary-color);
        }
        .medical-cross:before { top: 5px; left: 0; width: 14px; height: 4px; }
        .medical-cross:after { top: 0; left: 5px; width: 4px; height: 14px; }

        .quote-banner {
            width: 100%; background: var(--bg-accent); text-align: center;
            padding: 12px; font-style: italic; color: #4a5568; border-bottom: 1px solid #e2e8f0;
        }

        .container { max-width: 600px; width: 100%; margin: 40px auto; padding: 0 20px; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 35px;
            border: 1px solid #e2e8f0;
        }

        .card-title { font-size: 1.5rem; color: var(--secondary-color); margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #edf2f7; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus, select:focus { border-color: var(--secondary-color); }

        .btn {
            width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px;
            font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { background: #d62837; }

        .notification-box {
            margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: 600; display: none; text-align: center;
        }
        .status-closed { background-color: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .status-success { background-color: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
    </style>
</head>
<body>

    <header>
        <div class="doctor-name">Dr. Alok Mohta</div>
        <div class="doctor-meta">MBBS / MD Specialist</div>
        <div class="info-badges">
            <div class="badge"><span class="medical-cross"></span> <strong>Location:</strong> 17E CHB Jodhpur, Rajasthan, 342001</div>
            <div class="badge badge-red"><strong>Clinic Timing:</strong> 07:30 PM - 08:30 PM</div>
        </div>
    </header>

    <div class="quote-banner">"Medicines cure diseases, but only doctors can cure patients. Believe in healing."</div>

    <div class="container">
        <div class="card">
            <h2 class="card-title">Book Your Appointment</h2>
            
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="patientName">Patient Full Name</label>
                    <input type="text" id="patientName" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="patientDob">Date of Birth</label>
                    <input type="date" id="patientDob" required>
                </div>
                
                <div class="form-group">
                    <label for="bookingTime">Preferred Time Slot</label>
                    <select id="bookingTime" required>
                        <option value="" disabled selected>Select a session window</option>
                        <option value="07:30 PM - 07:45 PM">07:30 PM - 07:45 PM</option>
                        <option value="07:45 PM - 08:00 PM">07:45 PM - 08:00 PM</option>
                        <option value="08:00 PM - 08:15 PM">08:00 PM - 08:15 PM</option>
                        <option value="08:15 PM - 08:30 PM">08:15 PM - 08:30 PM</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Submit Appointment</button>
            </form>

            <div id="statusBox" class="notification-box"></div>
        </div>
    </div>

    <script>
        const appointmentForm = document.getElementById('appointmentForm');
        const statusBox = document.getElementById('statusBox');

        appointmentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            statusBox.style.display = "none";

            // CHECK REAL WORLD CLOCK FOR 8:30 PM LOCK ONLY
            const now = new Date();
            const currentMinutes = (now.getHours() * 60) + now.getMinutes();
            const closingMinutes = (20 * 60) + 30; // 20:30 translates to 8:30 PM

            // Only blocks if current time is strictly EQUAL TO or AFTER 8:30 PM
            if (currentMinutes >= closingMinutes) {
                statusBox.className = "notification-box status-closed";
                statusBox.innerHTML = "⚠️ The clinic has been closed. Submissions are locked after 08:30 PM.";
                statusBox.style.display = "block";
                return;
            }

            // Normal booking database saving logic
            const name = document.getElementById('patientName').value.trim();
            const dob = document.getElementById('patientDob').value;
            const timeSlot = document.getElementById('bookingTime').value;

            let existingAppointments = JSON.parse(localStorage.getItem('clinicAppointments')) || [];
            existingAppointments.push({ name: name, dob: dob, slot: timeSlot });
            localStorage.setItem('clinicAppointments', JSON.stringify(existingAppointments));

            appointmentForm.reset();
            statusBox.className = "notification-box status-success";
            statusBox.innerHTML = "✅ Appointment submitted successfully! Added to Dr. Alok Mohta's records.";
            statusBox.style.display = "block";
        });
    </script>
</body>
</html>
